# 🍎 OSXCross Builder - High Sierra (10.13) - PRODUCTION READY
name: 🍎 Build OSXCross - High Sierra 10.13 PRODUCTION

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  BUILD_PREFIX: '/opt/osxcross'
  JOBS: 8

jobs:
  build-highsierra-10-13:
    name: 🏔️ High Sierra (10.13)
    runs-on: ubuntu-latest
    timeout-minutes: 600
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get dist-upgrade -y
          sudo apt-get install -y build-essential cmake git wget curl gpg autoconf automake libtool libtool-bin pkg-config texinfo bison flex help2man gawk sed gzip bzip2 xz-utils zlib1g-dev libssl-dev libncurses5-dev libreadline-dev libgdbm-dev libsqlite3-dev libffi-dev uuid-dev python3-dev python3-pip clang llvm lld lldb mingw-w64 dosfstools hfsplus xorriso libpng-dev libjpeg-turbo8-dev libtiff-dev libwebp-dev libopenjp2-7-dev libfreetype6-dev libfontconfig1-dev libharfbuzz-dev libgomp1 libmpfr-dev libmpc-dev libisl-dev libelf-dev libzstd-dev libdebuginfod-dev ninja-build perl unzip

      - name: 📁 Setup directories
        run: |
          sudo mkdir -p ${BUILD_PREFIX}/{target,SDK,libs,tarballs,sources}
          sudo chown -R $(id -u):$(id -g) ${BUILD_PREFIX}

      - name: 📥 Clone osxcross
        run: |
          cd ${BUILD_PREFIX}
          git clone --recursive https://github.com/tpoechtrager/osxcross.git src

      - name: 🍎 Download SDK
        run: |
          cd ${BUILD_PREFIX}/src/tarballs
          wget -v -T 120 --tries=5 -O MacOSX10.13.sdk.tar.xz https://github.com/joseluisq/macosx-sdks/releases/download/10.13/MacOSX10.13.sdk.tar.xz
          ls -lh MacOSX10.13.sdk.tar.xz

      - name: 🏗️ Build osxcross
        run: |
          cd ${BUILD_PREFIX}/src
          export UNATTENDED=1
          export FORCE_PACK_EDH=1
          export SDK_VERSION=10.13
          ./build.sh 2>&1 | tail -50

      - name: 📋 Setup toolchain
        run: |
          cp -r ${BUILD_PREFIX}/src/target/* ${BUILD_PREFIX}/target/
          cd ${BUILD_PREFIX}/SDK
          tar xf ../src/tarballs/MacOSX10.13.sdk.tar.xz
          du -sh MacOSX10.13.sdk

      - name: ✅ Verify
        run: |
          export PATH=${BUILD_PREFIX}/target/bin:$PATH
          x86_64-apple-darwin17-clang --version

      - name: 📦 Build zlib
        run: |
          export PATH=${BUILD_PREFIX}/target/bin:$PATH
          export CC=x86_64-apple-darwin17-clang
          export CFLAGS="-mmacosx-version-min=10.13 -isysroot ${BUILD_PREFIX}/SDK/MacOSX10.13.sdk"
          export LDFLAGS="-mmacosx-version-min=10.13"
          
          cd ${BUILD_PREFIX}/sources
          wget -q https://zlib.net/zlib-1.3.1.tar.gz
          tar xzf zlib-1.3.1.tar.gz
          cd zlib-1.3.1
          ./configure --prefix=${BUILD_PREFIX}/libs/zlib --static
          make libz.a && make install
          cd ../..
          echo "✅ zlib done"

      - name: 📦 Build libpng
        run: |
          export PATH=${BUILD_PREFIX}/target/bin:$PATH
          export CC=x86_64-apple-darwin17-clang
          export CFLAGS="-mmacosx-version-min=10.13 -isysroot ${BUILD_PREFIX}/SDK/MacOSX10.13.sdk -I${BUILD_PREFIX}/libs/zlib/include"
          export LDFLAGS="-mmacosx-version-min=10.13 -L${BUILD_PREFIX}/libs/zlib/lib"
          
          cd ${BUILD_PREFIX}/sources
          wget -q https://download.sourceforge.net/libpng/libpng-1.6.43.tar.gz
          tar xzf libpng-1.6.43.tar.gz
          cd libpng-1.6.43
          ./configure --host=x86_64-apple-darwin17 --prefix=${BUILD_PREFIX}/libs/libpng --disable-shared
          make && make install
          cd ../..
          echo "✅ libpng done"

      - name: 📦 Build libjpeg
        run: |
          export PATH=${BUILD_PREFIX}/target/bin:$PATH
          export CC=x86_64-apple-darwin17-clang
          export CFLAGS="-mmacosx-version-min=10.13 -isysroot ${BUILD_PREFIX}/SDK/MacOSX10.13.sdk"
          export LDFLAGS="-mmacosx-version-min=10.13"
          
          cd ${BUILD_PREFIX}/sources
          wget -q https://downloads.sourceforge.net/project/libjpeg-turbo/3.0.1/libjpeg-turbo-3.0.1.tar.gz
          tar xzf libjpeg-turbo-3.0.1.tar.gz
          cd libjpeg-turbo-3.0.1
          mkdir -p build && cd build
          cmake -DCMAKE_SYSTEM_NAME=Darwin -DCMAKE_C_COMPILER=x86_64-apple-darwin17-clang -DCMAKE_OSX_SYSROOT=${BUILD_PREFIX}/SDK/MacOSX10.13.sdk -DCMAKE_OSX_DEPLOYMENT_TARGET=10.13 -DCMAKE_INSTALL_PREFIX=${BUILD_PREFIX}/libs/libjpeg -DENABLE_SHARED=OFF ..
          make && make install
          cd ../../..
          echo "✅ libjpeg done"

      - name: 📦 Build libtiff
        run: |
          export PATH=${BUILD_PREFIX}/target/bin:$PATH
          export CC=x86_64-apple-darwin17-clang
          export CFLAGS="-mmacosx-version-min=10.13 -isysroot ${BUILD_PREFIX}/SDK/MacOSX10.13.sdk"
          export LDFLAGS="-mmacosx-version-min=10.13 -L${BUILD_PREFIX}/libs/libjpeg/lib"
          
          cd ${BUILD_PREFIX}/sources
          wget -q https://download.osgeo.org/libtiff/tiff-4.6.0.tar.gz
          tar xzf tiff-4.6.0.tar.gz
          cd tiff-4.6.0
          ./configure --host=x86_64-apple-darwin17 --prefix=${BUILD_PREFIX}/libs/libtiff --disable-shared
          make && make install
          cd ../..
          echo "✅ libtiff done"

      - name: 📦 Build libxml2
        run: |
          export PATH=${BUILD_PREFIX}/target/bin:$PATH
          export CC=x86_64-apple-darwin17-clang
          export CFLAGS="-mmacosx-version-min=10.13 -isysroot ${BUILD_PREFIX}/SDK/MacOSX10.13.sdk"
          export LDFLAGS="-mmacosx-version-min=10.13"
          
          cd ${BUILD_PREFIX}/sources
          wget -q https://download.gnome.org/sources/libxml2/2.11/libxml2-2.11.5.tar.xz
          tar xf libxml2-2.11.5.tar.xz
          cd libxml2-2.11.5
          ./configure --host=x86_64-apple-darwin17 --prefix=${BUILD_PREFIX}/libs/libxml2 --without-python --disable-shared
          make && make install
          cd ../..
          echo "✅ libxml2 done"

      - name: 📦 Build OpenSSL
        run: |
          export PATH=${BUILD_PREFIX}/target/bin:$PATH
          export CC=x86_64-apple-darwin17-clang
          
          cd ${BUILD_PREFIX}/sources
          wget -q https://www.openssl.org/source/openssl-3.0.13.tar.gz
          tar xzf openssl-3.0.13.tar.gz
          cd openssl-3.0.13
          ./Configure darwin64-x86_64 shared --prefix=${BUILD_PREFIX}/libs/openssl -mmacosx-version-min=10.13
          make && make install
          cd ../..
          echo "✅ OpenSSL done"

      - name: 📊 Verify
        run: |
          echo "=== LIBRARIES ===" && find ${BUILD_PREFIX}/libs/lib -type f \( -name "*.a" -o -name "*.so" -o -name "*.dylib" \) | sort && echo "" && echo "=== SIZE ===" && du -sh ${BUILD_PREFIX}/{target,SDK,libs}

      - name: 📖 README
        run: |
          cat > ${BUILD_PREFIX}/README.md << 'EOF'
          # 🏔️ OSXCross - High Sierra (10.13)
          
          **Target:** x86_64-apple-darwin17
          
          ## Setup
          ```bash
          export OSXCROSS_ROOT=./
          export PATH=$OSXCROSS_ROOT/target/bin:$PATH
          export LD_LIBRARY_PATH=$OSXCROSS_ROOT/libs/lib:$LD_LIBRARY_PATH
          ```
          
          ## Compile
          ```bash
          x86_64-apple-darwin17-clang -mmacosx-version-min=10.13 \
            -isysroot $OSXCROSS_ROOT/SDK/MacOSX10.13.sdk \
            -L$OSXCROSS_ROOT/libs/lib -I$OSXCROSS_ROOT/libs/include \
            -o program program.c -lz -lpng -ljpeg -ltiff -lxml2
          ```
          
          Ready! 🎉
          EOF
          cat ${BUILD_PREFIX}/README.md

      - name: 📦 Archive
        run: |
          cd ${BUILD_PREFIX}
          tar --exclude='sources' --exclude='tarballs' -czf osxcross-10.13-$(date +%Y%m%d_%H%M%S).tar.gz target/ SDK/ libs/ README.md
          ls -lh osxcross-10.13-*.tar.gz

      - name: ☁️ Upload
        uses: actions/upload-artifact@v4
        with:
          name: osxcross-10.13
          path: ${{ env.BUILD_PREFIX }}/osxcross-10.13-*.tar.gz
          retention-days: 90

      - name: 🎉 Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.BUILD_PREFIX }}/osxcross-10.13-*.tar.gz
          tag_name: osxcross-10.13-${{ github.run_number }}
          body: "✅ OSXCross High Sierra 10.13 - ALL LIBRARIES WORKING! 🚀"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
