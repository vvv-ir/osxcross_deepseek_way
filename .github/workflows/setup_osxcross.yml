name: Build OSXCross and Release
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y git make cmake clang patch libxml2-dev libssl-dev

      - name: Clone OSXCross
        run: git clone https://github.com/tpoechtrager/osxcross.git

      - name: Download SDK
        run: |
          mkdir -p osxcross/tarballs
          wget -O osxcross/tarballs/MacOSX10.13.sdk.tar.xz https://github.com/phracker/MacOSX-SDKs/releases/download/10.13/MacOSX10.13.sdk.tar.xz

      - name: Build OSXCross (static)
        run: |
          cd osxcross
          export OSXCROSS_LIBXAR_STATIC=1
          UNATTENDED=1 ./build.sh

      - name: Package
        run: tar -czf osxcross-toolchain.tar.gz -C osxcross/target .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: osxcross-latest
          name: "OSXCross for High Sierra"
          files: osxcross-toolchain.tar.gz
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
