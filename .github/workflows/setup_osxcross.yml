name: Build OSXCross and Update Release
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup OSXCross
        id: setup
        uses: mbround18/setup-osxcross@v1
        with:
          osx-version: "10.13"
      - name: Find OSXCross installation path
        id: find
        run: |
          COMPILER=$(which o64-clang 2>/dev/null || true)
          if [ -n "$COMPILER" ]; then
            ROOT=$(dirname $(dirname "$COMPILER"))
            echo "path=$ROOT" >> $GITHUB_OUTPUT
            exit 0
          fi
          for candidate in /home/runner/work/_actions/mbround18/setup-osxcross/v1/osxcross \
                           /opt/hostedtoolcache/osxcross/* \
                           /usr/local/osxcross; do
            if [ -d "$candidate" ] && [ -f "$candidate/bin/o64-clang" ]; then
              echo "path=$candidate" >> $GITHUB_OUTPUT
              exit 0
            fi
          done
          exit 1
      - name: Package OSXCross
        run: |
          tar -czf osxcross-toolchain.tar.gz -C "${{ steps.find.outputs.path }}" .
      - name: Delete old tag and release
        run: |
          git push origin --delete osxcross-latest || true
          git tag -d osxcross-latest || true
      - name: Create new tag
        run: |
          git tag osxcross-latest
          git push origin osxcross-latest
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: osxcross-latest
          name: "OSXCross for High Sierra"
          files: osxcross-toolchain.tar.gz
          make_latest: true
