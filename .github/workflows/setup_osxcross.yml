name: Build Full OSXCross (with SDK) on Ubuntu
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make cmake clang patch wget xz-utils libxml2-dev libssl-dev

      - name: Clone OSXCross
        run: git clone https://github.com/tpoechtrager/osxcross.git

      - name: Download MacOSX10.13.sdk (from phracker)
        run: |
          cd osxcross
          mkdir -p tarballs
          wget -O tarballs/MacOSX10.13.sdk.tar.xz \
            https://github.com/phracker/MacOSX-SDKs/releases/download/10.13/MacOSX10.13.sdk.tar.xz

      - name: Build OSXCross (static, with full SDK)
        run: |
          cd osxcross
          export OSXCROSS_LIBXAR_STATIC=1
          export LD64_LIBXAR_STATIC=1
          UNATTENDED=1 ./build.sh

      - name: Copy SDK into target directory
        run: |
          cd osxcross
          # Распакованный SDK лежит в tarballs/MacOSX10.13.sdk
          mkdir -p target/SDK
          cp -r tarballs/MacOSX10.13.sdk target/SDK/
          # Также скопируем, если нужно, в target/SDK/MacOSX10.13.sdk
          echo "SDK copied"

      - name: Verify compiler and headers
        run: |
          export PATH=$(pwd)/osxcross/target/bin:$PATH
          o64-clang --version
          # Проверяем, что libc++ заголовки теперь доступны
          echo -e '#include <iostream>\nint main(){ return 0; }' > test.cpp
          o64-clang++ -isysroot $(pwd)/osxcross/target/SDK/MacOSX10.13.sdk test.cpp -o test && echo "OK: libc++ works" || exit 1

      - name: Package OSXCross (full, with SDK)
        run: |
          tar -czf osxcross-full.tar.gz -C osxcross/target .
          ls -lh osxcross-full.tar.gz

      - name: Delete old tag and release (if exists)
        run: |
          git push origin --delete osxcross-full || true
          git tag -d osxcross-full || true

      - name: Create tag osxcross-full
        run: |
          git tag osxcross-full
          git push origin osxcross-full

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: osxcross-full
          name: "OSXCross Full (with SDK, static ld64)"
          files: osxcross-full.tar.gz
          make_latest: true
