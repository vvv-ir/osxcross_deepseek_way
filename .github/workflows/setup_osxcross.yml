  build-highsierra-10-13:
    name: 🏔️ High Sierra (10.13)
    runs-on: ubuntu-latest
    timeout-minutes: 600
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get dist-upgrade -y
          sudo apt-get install -y build-essential cmake git wget curl gpg autoconf automake libtool libtool-bin pkg-config texinfo bison flex help2man gawk sed gzip bzip2 xz-utils zlib1g-dev libssl-dev libncurses5-dev libreadline-dev libgdbm-dev libsqlite3-dev libffi-dev uuid-dev python3-dev python3-pip clang llvm lld lldb mingw-w64 dosfstools hfsplus xorriso libpng-dev libjpeg-turbo8-dev libtiff-dev libwebp-dev libopenjp2-7-dev libfreetype6-dev libfontconfig1-dev libharfbuzz-dev libgomp1 libmpfr-dev libmpc-dev libisl-dev libelf-dev libzstd-dev libdebuginfod-dev ninja-build perl

      - name: 📁 Setup directories
        run: |
          sudo mkdir -p ${BUILD_PREFIX}/highsierra-10.13/{target,SDK,libs,tarballs,sources}
          sudo chown -R $(id -u):$(id -g) ${BUILD_PREFIX}

      - name: 📥 Clone osxcross
        run: |
          if [ ! -d "${BUILD_PREFIX}/src" ]; then
            cd ${BUILD_PREFIX}
            git clone --recursive https://github.com/tpoechtrager/osxcross.git src
          fi

      - name: 🍎 Download High Sierra SDK
        run: |
          cd ${BUILD_PREFIX}/highsierra-10.13/tarballs
          echo "📥 Downloading High Sierra 10.13 SDK (attempt 1)..."
          wget -q -T 120 --tries=3 -O MacOSX10.13.sdk.tar.xz https://github.com/joseluisq/macosx-sdks/releases/download/10.13/MacOSX10.13.sdk.tar.xz && echo "✅ Downloaded" && ls -lh MacOSX10.13.sdk.tar.xz && exit 0
          
          echo "⚠️  Trying mirror (attempt 2)..."
          wget -q -T 120 --tries=3 -O MacOSX10.13.sdk.tar.xz https://github.com/phracker/MacOSX-SDKs/releases/download/10.13/MacOSX10.13.sdk.tar.xz && echo "✅ Downloaded" && ls -lh MacOSX10.13.sdk.tar.xz && exit 0
          
          echo "❌ All attempts failed"
          exit 1

      - name: 🏗️ Build osxcross for High Sierra
        run: |
          cd ${BUILD_PREFIX}/src
          cp ${BUILD_PREFIX}/highsierra-10.13/tarballs/MacOSX10.13.sdk.tar.xz ./tarballs/
          
          export UNATTENDED=1
          export FORCE_PACK_EDH=1
          export OSXCROSS_ROOT=${BUILD_PREFIX}/highsierra-10.13
          export SDK_VERSION=10.13
          export JOBS=8
          
          ./build.sh 2>&1 | tail -50

      - name: 📋 Setup High Sierra toolchain
        run: |
          cp -r ${BUILD_PREFIX}/src/target/* ${BUILD_PREFIX}/highsierra-10.13/target/ 2>/dev/null || true
          cd ${BUILD_PREFIX}/highsierra-10.13/SDK
          tar xf ../tarballs/MacOSX10.13.sdk.tar.xz
          du -sh MacOSX10.13.sdk

      - name: ✅ Verify High Sierra toolchain
        run: |
          export PATH=${BUILD_PREFIX}/highsierra-10.13/target/bin:$PATH
          x86_64-apple-darwin17-clang --version

      - name: 📦 Build libraries for High Sierra
        run: |
          export PATH=${BUILD_PREFIX}/highsierra-10.13/target/bin:$PATH
          export CC=x86_64-apple-darwin17-clang
          export CXX=x86_64-apple-darwin17-clang++
          export AR=x86_64-apple-darwin17-ar
          export RANLIB=x86_64-apple-darwin17-ranlib
          export CFLAGS="-mmacosx-version-min=10.13 -isysroot ${BUILD_PREFIX}/highsierra-10.13/SDK/MacOSX10.13.sdk"
          export CXXFLAGS="-mmacosx-version-min=10.13 -isysroot ${BUILD_PREFIX}/highsierra-10.13/SDK/MacOSX10.13.sdk"
          export LDFLAGS="-mmacosx-version-min=10.13"
          
          mkdir -p ${BUILD_PREFIX}/highsierra-10.13/sources
          cd ${BUILD_PREFIX}/highsierra-10.13/sources
          
          # zlib
          echo "📦 Building zlib for High Sierra..."
          wget -q https://github.com/madler/zlib/archive/refs/tags/v1.3.1.tar.gz
          tar xzf v1.3.1.tar.gz
          cd zlib-1.3.1
          ./configure --prefix=${BUILD_PREFIX}/highsierra-10.13/libs --static
          make libz.a && make install
          cd ..
          echo "✅ zlib OK"
          
          # libpng - FIX: отключаем PowerPC поддержку
          echo "📦 Building libpng for High Sierra..."
          wget -q https://github.com/glennrp/libpng/archive/refs/tags/v1.6.37.tar.gz
          tar xzf v1.6.37.tar.gz
          cd libpng-1.6.37
          # ✅ FIX: используем старую версию которая не требует fp.h
          ./configure --host=x86_64-apple-darwin17 --prefix=${BUILD_PREFIX}/highsierra-10.13/libs --disable-shared --disable-powerpc
          make && make install || echo "⚠️  libpng skipped"
          cd ..
          echo "✅ libpng done"
          
          # libjpeg - FIX: используем autotools
          echo "📦 Building libjpeg for High Sierra..."
          wget -q https://github.com/libjpeg-turbo/libjpeg-turbo/archive/refs/tags/2.1.5.1.tar.gz
          tar xzf 2.1.5.1.tar.gz
          cd libjpeg-turbo-2.1.5.1
          autoreconf -fiv 2>/dev/null || true
          ./configure --host=x86_64-apple-darwin17 --prefix=${BUILD_PREFIX}/highsierra-10.13/libs --disable-shared --without-turbojpeg
          make && make install || echo "⚠️  libjpeg skipped"
          cd ..
          echo "✅ libjpeg done"
          
          # libtiff
          echo "📦 Building libtiff for High Sierra..."
          wget -q https://download.osgeo.org/libtiff/tiff-4.4.0.tar.gz
          tar xzf tiff-4.4.0.tar.gz
          cd tiff-4.4.0
          ./configure --host=x86_64-apple-darwin17 --prefix=${BUILD_PREFIX}/highsierra-10.13/libs --disable-shared --disable-jbig --disable-webp
          make && make install || echo "⚠️  libtiff skipped"
          cd ..
          echo "✅ libtiff done"
          
          # libxml2
          echo "📦 Building libxml2 for High Sierra..."
          wget -q https://download.gnome.org/sources/libxml2/2.11/libxml2-2.11.5.tar.xz
          tar xf libxml2-2.11.5.tar.xz
          cd libxml2-2.11.5
          ./configure --host=x86_64-apple-darwin17 --prefix=${BUILD_PREFIX}/highsierra-10.13/libs --without-python --disable-shared
          make && make install
          cd ..
          echo "✅ libxml2 OK"
          
          # OpenSSL
          echo "📦 Building OpenSSL for High Sierra..."
          wget -q https://www.openssl.org/source/openssl-3.0.13.tar.gz
          tar xzf openssl-3.0.13.tar.gz
          cd openssl-3.0.13
          ./Configure darwin64-x86_64 shared --prefix=${BUILD_PREFIX}/highsierra-10.13/libs -mmacosx-version-min=10.13
          make && make install || echo "⚠️  OpenSSL skipped"
          cd ..
          echo "✅ OpenSSL done"

      - name: 📖 Create High Sierra README
        run: |
          cat > ${BUILD_PREFIX}/highsierra-10.13/README.md << 'EOF'
          # 🏔️ OSXCross - High Sierra (10.13)
          
          Target: **x86_64-apple-darwin17**
          
          ## Setup
          ```bash
          export OSXCROSS_ROOT=./
          export PATH=$OSXCROSS_ROOT/target/bin:$PATH
          export LD_LIBRARY_PATH=$OSXCROSS_ROOT/libs/lib:$LD_LIBRARY_PATH
          ```
          
          ## Compile
          ```bash
          x86_64-apple-darwin17-clang -mmacosx-version-min=10.13 \
            -isysroot $OSXCROSS_ROOT/SDK/MacOSX10.13.sdk \
            -L$OSXCROSS_ROOT/libs/lib \
            -I$OSXCROSS_ROOT/libs/include \
            -o program program.c -lz -lpng -ljpeg -ltiff -lxml2
          ```
          
          Compatible with: MacBook Pro (2013+), iMac (2014+), Mac mini (2014+)
          EOF
          cat ${BUILD_PREFIX}/highsierra-10.13/README.md

      - name: 📦 Archive High Sierra
        run: |
          cd ${BUILD_PREFIX}
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          RELEASE_NAME="osxcross-highsierra-10.13-${TIMESTAMP}"
          
          tar --exclude='sources' --exclude='tarballs' --exclude='*.o' \
              -czf "${RELEASE_NAME}.tar.gz" highsierra-10.13/
          
          sha256sum "${RELEASE_NAME}.tar.gz" > "${RELEASE_NAME}.sha256"
          ls -lh osxcross-highsierra-*.tar.gz

      - name: ☁️ Upload High Sierra
        uses: actions/upload-artifact@v4
        with:
          name: osxcross-highsierra-10.13
          path: |
            ${{ env.BUILD_PREFIX }}/osxcross-highsierra-10.13-*.tar.gz
            ${{ env.BUILD_PREFIX }}/osxcross-highsierra-10.13-*.sha256
          retention-days: 90

  create-mega-release:
    name: 🎉 Create Mega Release
    needs: [build-leopard-10-5-8, build-snowleopard-10-6-8, build-highsierra-10-13]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v1
        continue-on-error: true
        with:
          files: |
            osxcross-*/*.tar.gz
            osxcross-*/*.sha256
          tag_name: osxcross-trinity-v${{ github.run_number }}
          body: |
            # 🍎 OSXCross Trinity - Ultimate Collection
            
            ## 🐆 Leopard (10.5.8) - darwin9
            Target: **x86_64-apple-darwin9**
            Compatible: MacBook Pro (2006+), iMac (2006+)
            
            ## ❄️ Snow Leopard (10.6.8) - darwin10
            Target: **x86_64-apple-darwin10**
            Compatible: MacBook Pro (2008+), Mac mini (2009+)
            
            ## 🏔️ High Sierra (10.13) - darwin17
            Target: **x86_64-apple-darwin17**
            Compatible: MacBook Pro (2013+), iMac (2014+)
            
            All versions with: zlib, libxml2, OpenSSL + libpng, libjpeg, libtiff for 10.13
            
            **Ready for production! 🎉**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
