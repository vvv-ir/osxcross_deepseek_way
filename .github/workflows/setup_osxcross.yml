# 🍎 OSXCross Builder - Leopard (10.5.8), Snow Leopard (10.6.8), High Sierra (10.13)
name: 🍎 Build OSXCross - 10.5.8 + 10.6.8 + 10.13

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

env:
  BUILD_PREFIX: '/opt/osxcross'
  JOBS: 8

jobs:
  build-leopard-10-5-8:
    name: 🐆 Leopard (10.5.8)
    runs-on: ubuntu-latest
    timeout-minutes: 600
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get dist-upgrade -y
          sudo apt-get install -y build-essential cmake git wget curl gpg autoconf automake libtool libtool-bin pkg-config texinfo bison flex help2man gawk sed gzip bzip2 xz-utils zlib1g-dev libssl-dev libncurses5-dev libreadline-dev libgdbm-dev libsqlite3-dev libffi-dev uuid-dev python3-dev python3-pip clang llvm lld lldb mingw-w64 dosfstools hfsplus xorriso libpng-dev libjpeg-turbo8-dev libtiff-dev libwebp-dev libopenjp2-7-dev libfreetype6-dev libfontconfig1-dev libharfbuzz-dev libgomp1 libmpfr-dev libmpc-dev libisl-dev libelf-dev libzstd-dev libdebuginfod-dev ninja-build perl

      - name: 📁 Setup directories
        run: |
          sudo mkdir -p ${BUILD_PREFIX}/leopard-10.5.8/{target,SDK,libs,tarballs,sources}
          sudo chown -R $(id -u):$(id -g) ${BUILD_PREFIX}

      - name: 📥 Clone osxcross
        run: |
          if [ ! -d "${BUILD_PREFIX}/src" ]; then
            cd ${BUILD_PREFIX}
            git clone --recursive https://github.com/tpoechtrager/osxcross.git src
          fi

      - name: 🍎 Download Leopard SDK
        run: |
          cd ${BUILD_PREFIX}/leopard-10.5.8/tarballs
          echo "📥 Downloading Leopard 10.5.8 SDK (attempt 1)..."
          wget -q -T 120 --tries=3 -O MacOSX10.5.sdk.tar.xz https://github.com/phracker/MacOSX-SDKs/releases/download/10.5.8/MacOSX10.5.sdk.tar.xz && echo "✅ Downloaded" && ls -lh MacOSX10.5.sdk.tar.xz && exit 0
          
          echo "⚠️  Trying mirror (attempt 2)..."
          wget -q -T 120 --tries=3 -O MacOSX10.5.sdk.tar.xz https://github.com/joseluisq/macosx-sdks/releases/download/10.5.8/MacOSX10.5.sdk.tar.xz && echo "✅ Downloaded" && ls -lh MacOSX10.5.sdk.tar.xz && exit 0
          
          echo "❌ SDK download failed - retrying with alternative source..."
          # Последний шанс
          wget -q -T 120 --tries=5 -O MacOSX10.5.sdk.tar.xz https://sourceforge.net/projects/osxcross/files/SDK/MacOSX10.5.sdk.tar.xz 2>/dev/null || true
          
          if [ -f "MacOSX10.5.sdk.tar.xz" ] && [ -s "MacOSX10.5.sdk.tar.xz" ]; then
            echo "✅ SDK found!"
            ls -lh MacOSX10.5.sdk.tar.xz
          else
            echo "❌ All SDK downloads failed"
            exit 1
          fi

      - name: 🏗️ Build osxcross for Leopard
        run: |
          cd ${BUILD_PREFIX}/src
          cp ${BUILD_PREFIX}/leopard-10.5.8/tarballs/MacOSX10.5.sdk.tar.xz ./tarballs/ 2>/dev/null || true
          
          export UNATTENDED=1
          export FORCE_PACK_EDH=1
          export OSXCROSS_ROOT=${BUILD_PREFIX}/leopard-10.5.8
          export SDK_VERSION=10.5.8
          export JOBS=8
          
          ./build.sh 2>&1 | tail -50

      - name: 📋 Setup Leopard toolchain
        run: |
          cp -r ${BUILD_PREFIX}/src/target/* ${BUILD_PREFIX}/leopard-10.5.8/target/ 2>/dev/null || true
          cd ${BUILD_PREFIX}/leopard-10.5.8/SDK
          tar xf ../tarballs/MacOSX10.5.sdk.tar.xz
          du -sh MacOSX10.5.sdk

      - name: ✅ Verify Leopard toolchain
        run: |
          export PATH=${BUILD_PREFIX}/leopard-10.5.8/target/bin:$PATH
          x86_64-apple-darwin9-clang --version

      - name: 📦 Build libraries for Leopard
        run: |
          export PATH=${BUILD_PREFIX}/leopard-10.5.8/target/bin:$PATH
          export CC=x86_64-apple-darwin9-clang
          export CXX=x86_64-apple-darwin9-clang++
          export AR=x86_64-apple-darwin9-ar
          export RANLIB=x86_64-apple-darwin9-ranlib
          export CFLAGS="-mmacosx-version-min=10.5.8 -isysroot ${BUILD_PREFIX}/leopard-10.5.8/SDK/MacOSX10.5.sdk"
          export CXXFLAGS="-mmacosx-version-min=10.5.8 -isysroot ${BUILD_PREFIX}/leopard-10.5.8/SDK/MacOSX10.5.sdk"
          export LDFLAGS="-mmacosx-version-min=10.5.8"
          
          mkdir -p ${BUILD_PREFIX}/leopard-10.5.8/sources
          cd ${BUILD_PREFIX}/leopard-10.5.8/sources
          
          # zlib
          echo "📦 Building zlib for Leopard..."
          wget -q https://github.com/madler/zlib/archive/refs/tags/v1.2.11.tar.gz
          tar xzf v1.2.11.tar.gz
          cd zlib-1.2.11
          ./configure --prefix=${BUILD_PREFIX}/leopard-10.5.8/libs --static
          make libz.a && make install
          cd ..
          echo "✅ zlib OK"
          
          # libxml2
          echo "📦 Building libxml2 for Leopard..."
          wget -q https://download.gnome.org/sources/libxml2/2.9/libxml2-2.9.14.tar.xz
          tar xf libxml2-2.9.14.tar.xz
          cd libxml2-2.9.14
          ./configure --host=x86_64-apple-darwin9 --prefix=${BUILD_PREFIX}/leopard-10.5.8/libs --without-python --disable-shared
          make && make install
          cd ..
          echo "✅ libxml2 OK"
          
          echo "📦 Building OpenSSL for Leopard..."
          wget -q https://www.openssl.org/source/openssl-1.0.2u.tar.gz
          tar xzf openssl-1.0.2u.tar.gz
          cd openssl-1.0.2u
          ./Configure darwin-x86_64 shared --prefix=${BUILD_PREFIX}/leopard-10.5.8/libs -mmacosx-version-min=10.5.8
          make && make install
          cd ..
          echo "✅ OpenSSL OK"

      - name: 📖 Create Leopard README
        run: |
          cat > ${BUILD_PREFIX}/leopard-10.5.8/README.md << 'EOF'
          # 🐆 OSXCross - Leopard (10.5.8)
          
          Target: **x86_64-apple-darwin9**
          
          ## Setup
          ```bash
          export OSXCROSS_ROOT=./
          export PATH=$OSXCROSS_ROOT/target/bin:$PATH
          export LD_LIBRARY_PATH=$OSXCROSS_ROOT/libs/lib:$LD_LIBRARY_PATH
          ```
          
          ## Compile
          ```bash
          x86_64-apple-darwin9-clang -mmacosx-version-min=10.5.8 \
            -isysroot $OSXCROSS_ROOT/SDK/MacOSX10.5.sdk \
            -L$OSXCROSS_ROOT/libs/lib \
            -I$OSXCROSS_ROOT/libs/include \
            -o program program.c -lz -lxml2
          ```
          
          Compatible with: MacBook Pro (2006+), iMac (2006+), Mac mini (2006+)
          EOF
          cat ${BUILD_PREFIX}/leopard-10.5.8/README.md

      - name: 📦 Archive Leopard
        run: |
          cd ${BUILD_PREFIX}
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          RELEASE_NAME="osxcross-leopard-10.5.8-${TIMESTAMP}"
          
          tar --exclude='sources' --exclude='tarballs' --exclude='*.o' \
              -czf "${RELEASE_NAME}.tar.gz" leopard-10.5.8/
          
          sha256sum "${RELEASE_NAME}.tar.gz" > "${RELEASE_NAME}.sha256"
          ls -lh osxcross-leopard-*.tar.gz

      - name: ☁️ Upload Leopard
        uses: actions/upload-artifact@v4
        with:
          name: osxcross-leopard-10.5.8
          path: |
            ${{ env.BUILD_PREFIX }}/osxcross-leopard-10.5.8-*.tar.gz
            ${{ env.BUILD_PREFIX }}/osxcross-leopard-10.5.8-*.sha256
          retention-days: 90

