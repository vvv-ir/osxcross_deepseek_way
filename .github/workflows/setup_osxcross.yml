name: Build OSXCross and Update Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup OSXCross
        id: osxcross
        uses: mbround18/setup-osxcross@v1
        with:
          osx-version: "10.13"

      # Находим реальный путь установки OSXCross
      - name: Find OSXCross path
        id: find-path
        run: |
          # Ищем папку, содержащую osxcross
          OSXCROSS_PATH=$(sudo find / -type d -name "osxcross" 2>/dev/null | head -1)
          if [ -z "$OSXCROSS_PATH" ]; then
            # Если папка не найдена, ищем компилятор и берём его родительскую папку
            COMPILER_PATH=$(which o64-clang 2>/dev/null || echo "")
            if [ -n "$COMPILER_PATH" ]; then
              OSXCROSS_PATH=$(dirname $(dirname "$COMPILER_PATH"))
            fi
          fi
          echo "Found OSXCross at: $OSXCROSS_PATH"
          echo "osxcross-path=$OSXCROSS_PATH" >> $GITHUB_OUTPUT

      # Упаковываем OSXCross, только если путь найден
      - name: Package OSXCross
        if: steps.find-path.outputs.osxcross-path != ''
        run: |
          OSXCROSS_PATH="${{ steps.find-path.outputs.osxcross-path }}"
          echo "Packaging from: $OSXCROSS_PATH"
          tar -czf osxcross-toolchain.tar.gz -C "$OSXCROSS_PATH" .
          ls -la osxcross-toolchain.tar.gz

      # Если путь не найден — завершаем с ошибкой
      - name: Fail if OSXCross not found
        if: steps.find-path.outputs.osxcross-path == ''
        run: |
          echo "ERROR: OSXCross installation path not found!"
          exit 1

      # Удалить старый тег и релиз
      - name: Delete old tag and release
        run: |
          git push origin --delete osxcross-latest || true
          git tag -d osxcross-latest || true

      # Создать новый тег
      - name: Create new tag
        run: |
          git tag osxcross-latest
          git push origin osxcross-latest

      # Создать релиз
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: osxcross-latest
          name: "OSXCross Latest (auto-built)"
          files: osxcross-toolchain.tar.gz
          make_latest: true
