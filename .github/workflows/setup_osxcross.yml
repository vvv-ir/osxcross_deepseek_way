name: Build OSXCross and Update Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Шаг 1: Установить OSXCross через action
      - name: Setup OSXCross
        id: osxcross                        # даём id, чтобы потом ссылаться на выходные данные
        uses: mbround18/setup-osxcross@v1
        with:
          osx-version: "10.13"              # High Sierra SDK

      # Шаг 2: Упаковать OSXCross в архив, используя путь из переменной
      - name: Package OSXCross
        run: |
          echo "OSXCross installed at: ${{ steps.osxcross.outputs.osxcross-path }}"
          # Переходим в папку, где лежит OSXCross, и архивируем всё её содержимое
          tar -czf osxcross-toolchain.tar.gz -C ${{ steps.osxcross.outputs.osxcross-path }} .

      # Шаг 3: Удалить старый тег и релиз (если есть)
      - name: Delete old tag and release
        run: |
          git push origin --delete osxcross-latest || true
          git tag -d osxcross-latest || true

      # Шаг 4: Создать новый тег
      - name: Create new tag
        run: |
          git tag osxcross-latest
          git push origin osxcross-latest

      # Шаг 5: Создать релиз и прикрепить архив
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: osxcross-latest
          name: "OSXCross Latest (auto-built)"
          files: osxcross-toolchain.tar.gz
          make_latest: true
