name: Build OSXCross and Update Release

on:
  push:
    branches:
      - main          # запуск при пуше в main
  workflow_dispatch:  # или вручную, если захотите

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup OSXCross
        uses: mbround18/setup-osxcross@v1
        with:
          osx-version: "10.13"

      - name: Package OSXCross
        run: tar -czf osxcross-toolchain.tar.gz -C /usr/local/osxcross .

      - name: Delete old tag and release (if exists)
        run: |
          # Удаляем удалённый тег (если есть)
          git push origin --delete osxcross-latest || true
          # Удаляем локальный тег
          git tag -d osxcross-latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create new tag
        run: |
          git tag osxcross-latest
          git push origin osxcross-latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: osxcross-latest
          name: "OSXCross Latest (auto-built)"
          body: "Автоматическая сборка OSXCross для High Sierra из последнего коммита."
          files: osxcross-toolchain.tar.gz
          draft: false
          prerelease: false
          # Важно: разрешаем перезаписывать существующий релиз с тем же тегом
          make_latest: true
