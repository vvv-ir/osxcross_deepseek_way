name: Build OSXCross Release for macOS High Sierra

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

env:
  OSXCROSS_SDK_VERSION: '10.13'
  MACOS_TARGET: 'high-sierra'
  BUILD_PREFIX: '/opt/osxcross'
  JOBS: 16

jobs:
  build-osxcross-complete:
    runs-on: ubuntu-latest
    timeout-minutes: 600
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install base dependencies
        run: |
          sudo apt-get update
          sudo apt-get dist-upgrade -y
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            wget \
            curl \
            gpg \
            autoconf \
            automake \
            libtool \
            libtool-bin \
            pkg-config \
            texinfo \
            bison \
            flex \
            help2man \
            gawk \
            sed \
            gzip \
            bzip2 \
            xz-utils \
            zlib1g-dev \
            libssl-dev \
            libncurses5-dev \
            libreadline-dev \
            libgdbm-dev \
            libsqlite3-dev \
            libffi-dev \
            uuid-dev \
            python3-dev \
            python3-pip \
            clang \
            llvm \
            lld \
            lldb \
            mingw-w64 \
            dosfstools \
            hfsplus \
            xorriso \
            libpng-dev \
            libjpeg-turbo8-dev \
            libtiff-dev \
            libwebp-dev \
            libopenjp2-7-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libgomp1 \
            libmpfr-dev \
            libmpc-dev \
            libisl-dev \
            libelf-dev \
            libzstd-dev \
            libdebuginfod-dev \
            ninja-build

      - name: Create build directory structure
        run: |
          sudo mkdir -p ${BUILD_PREFIX}
          sudo mkdir -p ${BUILD_PREFIX}/{target,SDK,libs,tarballs,sources}
          sudo chown -R $(id -u):$(id -g) ${BUILD_PREFIX}

      - name: Clone osxcross repository
        run: |
          cd ${BUILD_PREFIX}
          git clone --recursive https://github.com/tpoechtrager/osxcross.git src
          cd src
          git log --oneline -10

      - name: Download macOS High Sierra SDK (10.13)
        run: |
          cd ${BUILD_PREFIX}/tarballs
          echo "Downloading macOS 10.13 SDK..."
          
          if ! wget -q -T 30 --tries=3 \
            -O MacOSX10.13.sdk.tar.xz \
            https://github.com/joseluisq/macosx-sdks/releases/download/10.13/MacOSX10.13.sdk.tar.xz; then
            
            echo "Primary mirror failed, trying alternative source..."
            curl -L -o MacOSX10.13.sdk.tar.xz \
              https://github.com/phracker/MacOSX-SDKs/releases/download/10.13/MacOSX10.13.sdk.tar.xz || true
          fi
          
          if [ -f MacOSX10.13.sdk.tar.xz ]; then
            echo "✓ SDK downloaded ($(du -h MacOSX10.13.sdk.tar.xz | cut -f1))"
            echo "Extracting SDK..."
            tar -xf MacOSX10.13.sdk.tar.xz -C ${BUILD_PREFIX}/SDK/
            ls -lah ${BUILD_PREFIX}/SDK/
          else
            echo "❌ SDK download failed"
            exit 1
          fi

      - name: Configure osxcross build
        run: |
          cd ${BUILD_PREFIX}/src
          
          cat > build.config << 'CONFIG'
          export UNATTENDED=1
          export FORCE_PACK_EDH=1
          export OSXCROSS_ROOT="${BUILD_PREFIX}"
          export SDK_VERSION="${OSXCROSS_SDK_VERSION}"
          export JOBS=${JOBS}
          export TARGET_DIR="${BUILD_PREFIX}/target"
          CONFIG
          
          cat build.config

      - name: Build osxcross toolchain
        run: |
          cd ${BUILD_PREFIX}/src
          source build.config
          
          echo "Building osxcross with SDK ${SDK_VERSION}..."
          
          if [ -d "${BUILD_PREFIX}/SDK/MacOSX${SDK_VERSION}.sdk" ]; then
            export OSXCROSS_SDK="${BUILD_PREFIX}/SDK/MacOSX${SDK_VERSION}.sdk"
          fi
          
          ./build.sh 2>&1 | tee build_osxcross.log
          
          if [ $? -ne 0 ]; then
            echo "❌ osxcross build failed!"
            tail -100 build_osxcross.log
            exit 1
          fi
          
          echo "✓ osxcross build completed"

      - name: Verify osxcross installation
        run: |
          export PATH=${BUILD_PREFIX}/target/bin:$PATH
          export OSXCROSS_ROOT=${BUILD_PREFIX}
          
          echo "=== Toolchain verification ==="
          
          for tool in clang clang++ ar ranlib strip; do
            if [ -f "${BUILD_PREFIX}/target/bin/x86_64-apple-darwin${OSXCROSS_SDK_VERSION}-${tool}" ]; then
              echo "✓ Found: x86_64-apple-darwin${OSXCROSS_SDK_VERSION}-${tool}"
            fi
          done
          
          ${BUILD_PREFIX}/target/bin/x86_64-apple-darwin${OSXCROSS_SDK_VERSION}-clang --version

      - name: Build OpenSSL for macOS
        run: |
          export PATH=${BUILD_PREFIX}/target/bin:$PATH
          
          echo "Building OpenSSL..."
          cd ${BUILD_PREFIX}/sources
          
          if [ ! -f "openssl-1.1.1w.tar.gz" ]; then
            wget -q https://www.openssl.org/source/openssl-1.1.1w.tar.gz
          fi
          
          tar xzf openssl-1.1.1w.tar.gz
          cd openssl-1.1.1w
          
          CC=x86_64-apple-darwin${OSXCROSS_SDK_VERSION}-clang \
          ./Configure darwin64-x86_64 shared \
            --prefix=${BUILD_PREFIX}/libs/openssl 2>&1 | tail -30
          
          make -j${JOBS} 2>&1 | tail -30
          make install || echo "⚠ OpenSSL build completed with warnings"

      - name: Build zlib for macOS
        run: |
          export PATH=${BUILD_PREFIX}/target/bin:$PATH
          
          echo "Building zlib..."
          cd ${BUILD_PREFIX}/sources
          
          if [ ! -f "zlib-1.3.1.tar.gz" ]; then
            wget -q https://github.com/madler/zlib/archive/refs/tags/v1.3.1.tar.gz
          fi
          
          tar xzf zlib-1.3.1.tar.gz
          cd zlib-1.3.1
          
          CC=x86_64-apple-darwin${OSXCROSS_SDK_VERSION}-clang \
          ./configure --prefix=${BUILD_PREFIX}/libs/zlib 2>&1 | tail -20
          
          make -j${JOBS} 2>&1 | tail -30
          make install || echo "⚠ zlib build completed with warnings"

      - name: Build libpng for macOS
        run: |
          export PATH=${BUILD_PREFIX}/target/bin:$PATH
          
          echo "Building libpng..."
          cd ${BUILD_PREFIX}/sources
          
          if [ ! -d "libpng" ]; then
            git clone --depth=1 https://github.com/glennrp/libpng.git || true
          fi
          
          cd libpng
          autoreconf -fiv 2>&1 | tail -20 || true
          
          CC=x86_64-apple-darwin${OSXCROSS_SDK_VERSION}-clang \
          ./configure \
            --host=x86_64-apple-darwin${OSXCROSS_SDK_VERSION} \
            --prefix=${BUILD_PREFIX}/libs/libpng 2>&1 | tail -20
          
          make -j${JOBS} 2>&1 | tail -30
          make install || echo "⚠ libpng build completed with warnings"

      - name: Build libjpeg for macOS
        run: |
          export PATH=${BUILD_PREFIX}/target/bin:$PATH
          
          echo "Building libjpeg-turbo..."
          cd ${BUILD_PREFIX}/sources
          
          if [ ! -d "libjpeg-turbo" ]; then
            git clone --depth=1 https://github.com/libjpeg-turbo/libjpeg-turbo.git || true
          fi
          
          cd libjpeg-turbo
          mkdir -p build && cd build
          
          cmake \
            -DCMAKE_SYSTEM_NAME=Darwin \
            -DCMAKE_C_COMPILER=x86_64-apple-darwin${OSXCROSS_SDK_VERSION}-clang \
            -DCMAKE_CXX_COMPILER=x86_64-apple-darwin${OSXCROSS_SDK_VERSION}-clang++ \
            -DCMAKE_INSTALL_PREFIX=${BUILD_PREFIX}/libs/libjpeg \
            -DENABLE_SHARED=ON \
            .. 2>&1 | tail -30
          
          make -j${JOBS} 2>&1 | tail -30
          make install || echo "⚠ libjpeg build completed with warnings"

      - name: Build libtiff for macOS
        run: |
          export PATH=${BUILD_PREFIX}/target/bin:$PATH
          
          echo "Building libtiff..."
          cd ${BUILD_PREFIX}/sources
          
          if [ ! -d "libtiff" ]; then
            git clone --depth=1 https://github.com/LibTIFF/libtiff.git || true
          fi
          
          cd libtiff
          autoreconf -fiv 2>&1 | tail -20 || true
          
          CC=x86_64-apple-darwin${OSXCROSS_SDK_VERSION}-clang \
          ./configure \
            --host=x86_64-apple-darwin${OSXCROSS_SDK_VERSION} \
            --prefix=${BUILD_PREFIX}/libs/libtiff 2>&1 | tail -20
          
          make -j${JOBS} 2>&1 | tail -30
          make install || echo "⚠ libtiff build completed with warnings"

      - name: Build libxml2 for macOS
        run: |
          export PATH=${BUILD_PREFIX}/target/bin:$PATH
          
          echo "Building libxml2..."
          cd ${BUILD_PREFIX}/sources
          
          if [ ! -f "libxml2-2.11.5.tar.gz" ]; then
            wget -q ftp://xmlsoft.org/libxml2/libxml2-2.11.5.tar.gz || \
            wget -q https://download.gnome.org/sources/libxml2/2.11/libxml2-2.11.5.tar.xz
          fi
          
          tar xf libxml2-*.tar.* 2>/dev/null
          cd libxml2-2.11.5
          
          CC=x86_64-apple-darwin${OSXCROSS_SDK_VERSION}-clang \
          ./configure \
            --host=x86_64-apple-darwin${OSXCROSS_SDK_VERSION} \
            --prefix=${BUILD_PREFIX}/libs/libxml2 \
            --without-python 2>&1 | tail -20
          
          make -j${JOBS} 2>&1 | tail -30
          make install || echo "⚠ libxml2 build completed with warnings"

      - name: Build Boost for macOS
        run: |
          export PATH=${BUILD_PREFIX}/target/bin:$PATH
          
          echo "Building Boost..."
          cd ${BUILD_PREFIX}/sources
          
          if [ ! -f "boost_1_82_0.tar.bz2" ]; then
            wget -q https://boostorg.jfrog.io/artifactory/main/release/1.82.0/source/boost_1_82_0.tar.bz2
          fi
          
          tar xjf boost_1_82_0.tar.bz2
          cd boost_1_82_0
          
          ./bootstrap.sh --prefix=${BUILD_PREFIX}/libs/boost 2>&1 | tail -20
          
          ./b2 -j${JOBS} \
            --with-system \
            --with-filesystem \
            --with-thread \
            --with-date_time \
            --with-regex \
            --with-chrono \
            toolset=clang \
            cxxflags="-fPIC -stdlib=libc++" \
            link=shared 2>&1 | tail -30
          
          ./b2 install 2>&1 | tail -20 || echo "⚠ Boost build completed with warnings"

      - name: Build OpenImageIO (OIIO)
        run: |
          export PATH=${BUILD_PREFIX}/target/bin:$PATH
          
          echo "Building OpenImageIO..."
          cd ${BUILD_PREFIX}/sources
          
          if [ ! -d "oiio" ]; then
            git clone --depth=1 --branch v2.4.17.0 https://github.com/OpenImageIO/oiio.git || true
          fi
          
          cd oiio
          mkdir -p build && cd build
          
          cmake \
            -DCMAKE_SYSTEM_NAME=Darwin \
            -DCMAKE_C_COMPILER=x86_64-apple-darwin${OSXCROSS_SDK_VERSION}-clang \
            -DCMAKE_CXX_COMPILER=x86_64-apple-darwin${OSXCROSS_SDK_VERSION}-clang++ \
            -DCMAKE_INSTALL_PREFIX=${BUILD_PREFIX}/libs/oiio \
            -DOIIO_BUILD_TOOLS=OFF \
            -DOIIO_BUILD_TESTS=OFF \
            .. 2>&1 | tail -30
          
          make -j${JOBS} 2>&1 | tail -30
          make install || echo "⚠ OIIO build completed with warnings"

      - name: Create release package
        run: |
          cd ${BUILD_PREFIX}
          
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          RELEASE_NAME="osxcross-complete-highsierra-${TIMESTAMP}"
          
          echo "Creating release package: $RELEASE_NAME"
          
          tar --exclude='tarballs' \
              --exclude='sources' \
              --exclude='src/.git' \
              -czf "${RELEASE_NAME}.tar.gz" \
              target/ SDK/ libs/ src/tools src/wrapper src/docs src/*.sh src/LICENSE
          
          sha256sum "${RELEASE_NAME}.tar.gz" > "${RELEASE_NAME}.sha256"
          
          ls -lh "${RELEASE_NAME}"*

      - name: Create manifest file
        run: |
          cd ${BUILD_PREFIX}
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          RELEASE_NAME="osxcross-complete-highsierra-${TIMESTAMP}"
          
          cat > "${RELEASE_NAME}-MANIFEST.txt" << 'MANIFEST'
OSXCross Complete Release - macOS High Sierra (10.13)
======================================================

Build Date: $(date -u)
Build Platform: Ubuntu Latest
SDK Version: 10.13 (High Sierra)
Toolchain Target: x86_64-apple-darwin13

INCLUDED COMPONENTS:
====================

Core Toolchain:
- osxcross x86_64-apple-darwin13 (clang, clang++, g++, ar, ranlib, strip, etc.)
- Binutils
- LLVM tools

Libraries:
- OpenSSL 1.1 (SSL/TLS)
- zlib 1.3.1 (compression)
- libpng (PNG support)
- libjpeg-turbo (JPEG support)
- libtiff (TIFF support)
- libxml2 2.11.5 (XML parsing)
- Boost 1.82 (C++ libraries)
- OpenImageIO 2.4.17 (image I/O)

macOS SDK:
- MacOSX 10.13 SDK (High Sierra)

INSTALLATION:
=============

1. Extract the archive:
   tar xzf osxcross-complete-highsierra-*.tar.gz -C /opt/

2. Set environment variables in ~/.bashrc or ~/.zshrc:
   export OSXCROSS_ROOT=/opt/osxcross
   export PATH=$OSXCROSS_ROOT/target/bin:$PATH
   export LD_LIBRARY_PATH=$OSXCROSS_ROOT/libs/lib:$LD_LIBRARY_PATH
   export PKG_CONFIG_PATH=$OSXCROSS_ROOT/libs/lib/pkgconfig:$PKG_CONFIG_PATH

3. Verify installation:
   x86_64-apple-darwin13-clang --version

BASIC USAGE:
============

Compile C code:
  x86_64-apple-darwin13-clang -mmacosx-version-min=10.13 \
    -isysroot $OSXCROSS_ROOT/SDK/MacOSX10.13.sdk \
    -o output.o -c input.c

Link program with libraries:
  x86_64-apple-darwin13-clang -o program *.o \
    -L$OSXCROSS_ROOT/libs/lib \
    -lssl -lcrypto -lz -lpng -ljpeg

CMake configuration:
  cmake -DCMAKE_SYSTEM_NAME=Darwin \
        -DCMAKE_C_COMPILER=x86_64-apple-darwin13-clang \
        -DCMAKE_CXX_COMPILER=x86_64-apple-darwin13-clang++ \
        -DCMAKE_SYSROOT=$OSXCROSS_ROOT/SDK/MacOSX10.13.sdk \
        -DCMAKE_PREFIX_PATH=$OSXCROSS_ROOT/libs ..

PKG_CONFIG:
  pkg-config --cflags --libs libxml-2.0
  pkg-config --cflags --libs OpenImageIO
MANIFEST

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: osxcross-highsierra-complete
          path: |
            ${{ env.BUILD_PREFIX }}/osxcross-complete-highsierra-*.tar.gz
            ${{ env.BUILD_PREFIX }}/osxcross-complete-highsierra-*.sha256
            ${{ env.BUILD_PREFIX }}/osxcross-complete-highsierra-*-MANIFEST.txt
          retention-days: 90

      - name: Create build summary
        if: always()
        run: |
          cd ${BUILD_PREFIX}
          
          {
            echo "=== BUILD SUMMARY ==="
            echo "Build completed: $(date)"
            echo ""
            echo "Release packages:"
            ls -lh osxcross-complete-highsierra-*.tar.gz 2>/dev/null || echo "No packages found"
            echo ""
            echo "Component sizes:"
            du -sh target/ SDK/ libs/ 2>/dev/null
            echo ""
            echo "Libraries included:"
            find libs -type f \( -name "*.a" -o -name "*.so" -o -name "*.dylib" \) 2>/dev/null | wc -l
          } | tee BUILD_SUMMARY.txt

      - name: Upload build summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-summary
          path: ${{ env.BUILD_PREFIX }}/BUILD_SUMMARY.txt
