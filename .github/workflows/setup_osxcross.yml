name: Build OSXCross (fully static, no libxar dependency)
on:
 # push:
  #  branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make cmake clang patch libxml2-dev libssl-dev

      - name: Clone OSXCross
        run: git clone https://github.com/tpoechtrager/osxcross.git

      - name: Download MacOSX10.13.sdk
        run: |
          mkdir -p osxcross/tarballs
          wget -O osxcross/tarballs/MacOSX10.13.sdk.tar.xz \
            https://github.com/phracker/MacOSX-SDKs/releases/download/10.13/MacOSX10.13.sdk.tar.xz

      - name: Build OSXCross with static ld64
        run: |
          cd osxcross
          export OSXCROSS_LIBXAR_STATIC=1
          export LD64_LIBXAR_STATIC=1
          UNATTENDED=1 ./build.sh

      - name: Verify static linker
        run: |
          file osxcross/target/bin/x86_64-apple-darwin17-ld | grep -q "statically linked" && echo "OK: static" || echo "Warning: may still be dynamic"
          ldd osxcross/target/bin/x86_64-apple-darwin17-ld 2>&1 | grep "not a dynamic executable" && echo "Fully static"

      - name: Package toolchain
        run: tar -czf osxcross-toolchain.tar.gz -C osxcross/target .

      - name: Delete old tag and release
        run: |
          git push origin --delete osxcross-latest || true
          git tag -d osxcross-latest || true

      - name: Create new tag
        run: |
          git tag osxcross-latest
          git push origin osxcross-latest

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: osxcross-latest
          name: "OSXCross for High Sierra (fully static)"
          files: osxcross-toolchain.tar.gz
          make_latest: true
